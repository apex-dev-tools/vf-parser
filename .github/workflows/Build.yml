name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node 22
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 11
        cache: 'maven'

    - name: Init
      run: npm run init

    - name: Build & Test
      run: npm run build
